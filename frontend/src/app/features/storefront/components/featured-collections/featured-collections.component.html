<section class="collections" aria-labelledby="featured-collections-title">
  <div class="collections__header">
    <h2 id="featured-collections-title">Colecciones destacadas</h2>
  </div>

  <div class="collections__scroller">
    @for (collection of collections; track trackByCollection($index, collection)) {
      <button
        class="collections__card collections__card--{{ collection.tone }}"
        type="button"
        (click)="collectionSelected.emit(collection)"
      >
        <div class="collections__visual">
          <span class="collections__pedestal" aria-hidden="true"></span>

          @if (collection.image_url) {
            <img [src]="collection.image_url" [alt]="collection.title" />
          } @else {
            <div class="collections__placeholder" aria-hidden="true">
              <span>{{ collection.title.slice(0, 1) }}</span>
            </div>
          }
        </div>

        <span class="collections__label">{{ collection.title }}</span>
      </button>
    }
  </div>
</section>
