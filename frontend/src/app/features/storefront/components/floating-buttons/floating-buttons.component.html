<div class="floating-ui">
  <a
    class="floating-ui__promo"
    [href]="promoUrl"
    target="_blank"
    rel="noreferrer"
    (click)="promoClick.emit()"
  >
    <span class="floating-ui__promo-icon" aria-hidden="true">+</span>
    <span>{{ promoLabel }}</span>
  </a>

  <div class="floating-ui__support-box">
    {{ helpText }}
  </div>

  <a class="floating-ui__whatsapp" [href]="whatsappUrl" target="_blank" rel="noreferrer" aria-label="Abrir WhatsApp">
    <span class="material-symbols-outlined">forum</span>
  </a>
</div>
