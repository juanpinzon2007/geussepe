services:
  postgres:
    image: postgres:16-alpine
    container_name: arle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario_sexshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventario_sexshop"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arle-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventario_sexshop
      JWT_SECRET: super-secret-inventory-key
      JWT_EXPIRES_IN: 8h
      DEFAULT_ADMIN_PASSWORD: Admin123*
    ports:
      - "3000:3000"
    volumes:
      # Solo productos subidos por usuarios; /app/uploads/catalog viene de la imagen Docker.
      - ./uploads/products:/app/uploads/products

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arle-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "4200:80"

volumes:
  postgres_data:
